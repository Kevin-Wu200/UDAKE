<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试高德地图加载</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            padding: 20px;
        }
        #log {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            max-height: 400px;
            overflow-y: auto;
            margin: 20px 0;
            font-family: monospace;
            font-size: 12px;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #ccc;
        }
        .log-info { border-left-color: #2196F3; }
        .log-success { border-left-color: #4CAF50; }
        .log-error { border-left-color: #f44336; }
        #map {
            width: 100%;
            height: 400px;
            border: 2px solid #ccc;
            margin: 20px 0;
        }
        .button-group {
            margin: 10px 0;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>高德地图加载测试</h1>
    <p>测试不同的高德地图加载方式</p>

    <div class="button-group">
        <button onclick="testMethod1()">方法 1: 轮询检查</button>
        <button onclick="testMethod2()">方法 2: 回调函数</button>
        <button onclick="testMethod3()">方法 3: 原生方式</button>
        <button onclick="clearLog()">清空日志</button>
    </div>

    <div id="map"></div>
    <div id="log"></div>

    <script>
        function addLog(message, type = 'info') {
            const logDiv = document.getElementById('log');
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function clearLog() {
            document.getElementById('log').innerHTML = '';
        }

        // 设置安全密钥
        window._AMapSecurityConfig = {
            securityJsCode: "10b5ef21f6b36d09e24d7b076d35dccc"
        };

        // 方法 1: 轮询检查
        async function testMethod1() {
            addLog('=== 开始测试方法 1: 轮询检查 ===', 'info');

            try {
                const script = document.createElement('script');
                script.src = 'https://webapi.amap.com/maps?v=2.0&key=2f3f114aa5671425aa3c52f707d741c5';
                script.async = true;

                script.onload = () => {
                    addLog('脚本加载完成，开始轮询检查 AMap...', 'info');

                    let checkCount = 0;
                    const checkInterval = setInterval(() => {
                        checkCount++;
                        addLog(`检查状态 ${checkCount}: window.AMap = ${!!window.AMap}, window.AMap.Map = ${window.AMap ? !!window.AMap.Map : false}`, 'info');

                        if (window.AMap && window.AMap.Map) {
                            clearInterval(checkInterval);
                            addLog('✅ 方法 1 成功: AMap 已加载', 'success');
                            initMap();
                        } else if (checkCount >= 300) {
                            clearInterval(checkInterval);
                            addLog('❌ 方法 1 失败: 超时', 'error');
                        }
                    }, 50);
                };

                script.onerror = () => {
                    addLog('❌ 方法 1 失败: 脚本加载失败', 'error');
                };

                document.head.appendChild(script);
            } catch (error) {
                addLog(`❌ 方法 1 错误: ${error.message}`, 'error');
            }
        }

        // 方法 2: 回调函数
        async function testMethod2() {
            addLog('=== 开始测试方法 2: 回调函数 ===', 'info');

            try {
                window.testAMapCallback = () => {
                    addLog('回调函数被触发', 'info');

                    if (window.AMap && window.AMap.Map) {
                        addLog('✅ 方法 2 成功: AMap 已加载', 'success');
                        initMap();
                    } else {
                        addLog('❌ 方法 2 失败: AMap 不完整', 'error');
                    }
                };

                const script = document.createElement('script');
                script.src = 'https://webapi.amap.com/maps?v=2.0&key=2f3f114aa5671425aa3c52f707d741c5&callback=testAMapCallback';
                script.async = true;

                script.onerror = () => {
                    addLog('❌ 方法 2 失败: 脚本加载失败', 'error');
                };

                document.head.appendChild(script);
            } catch (error) {
                addLog(`❌ 方法 2 错误: ${error.message}`, 'error');
            }
        }

        // 方法 3: 原生方式（简单）
        async function testMethod3() {
            addLog('=== 开始测试方法 3: 原生方式 ===', 'info');

            try {
                const script = document.createElement('script');
                script.src = 'https://webapi.amap.com/maps?v=2.0&key=2f3f114aa5671425aa3c52f707d741c5';
                script.async = true;

                script.onload = () => {
                    addLog('脚本加载完成，等待 2 秒后检查...', 'info');

                    setTimeout(() => {
                        if (window.AMap && window.AMap.Map) {
                            addLog('✅ 方法 3 成功: AMap 已加载', 'success');
                            initMap();
                        } else {
                            addLog('❌ 方法 3 失败: AMap 未加载', 'error');
                            addLog(`AMap 状态: ${JSON.stringify({
                                hasAMap: !!window.AMap,
                                keys: window.AMap ? Object.keys(window.AMap).slice(0, 20) : []
                            })}`, 'info');
                        }
                    }, 2000);
                };

                script.onerror = () => {
                    addLog('❌ 方法 3 失败: 脚本加载失败', 'error');
                };

                document.head.appendChild(script);
            } catch (error) {
                addLog(`❌ 方法 3 错误: ${error.message}`, 'error');
            }
        }

        function initMap() {
            try {
                const map = new AMap.Map('map', {
                    center: [116.397428, 39.90923],
                    zoom: 13
                });
                addLog('✅ 地图初始化成功', 'success');
            } catch (error) {
                addLog(`❌ 地图初始化失败: ${error.message}`, 'error');
            }
        }

        // 页面加载时自动测试
        addLog('页面已加载，点击按钮开始测试', 'info');
    </script>
</body>
</html>
