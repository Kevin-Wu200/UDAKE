server {
    listen 6060;
    server_name ${FRONTEND_SERVER_NAME};

    # 官网静态文件
    location / {
        root /usr/share/nginx/landing-page;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # API代理
    location /api/ {
        proxy_pass ${BACKEND_URL}/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 结果文件
    location /results/ {
        proxy_pass ${BACKEND_URL}/results/;
        proxy_set_header Host $host;
    }

    # Android APK 下载
    location /android_downloads/ {
        proxy_pass http://backend:8000/android_downloads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Windows EXE 下载
    location /windows_downloads/ {
        proxy_pass http://backend:8000/windows_downloads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # macOS DMG 下载
    location /macos_downloads/ {
        proxy_pass http://backend:8000/macos_downloads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Gzip压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;
}
