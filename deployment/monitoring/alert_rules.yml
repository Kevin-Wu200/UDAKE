groups:
  - name: udake-system-alerts
    rules:
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU 使用率过高"
          description: "实例 {{ $labels.instance }} CPU 使用率连续 5 分钟超过 85%。"

      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "内存使用率过高"
          description: "实例 {{ $labels.instance }} 内存使用率连续 5 分钟超过 90%。"

      - alert: LowDiskSpace
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay"} / node_filesystem_size_bytes{fstype!~"tmpfs|overlay"}) * 100 < 15
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "磁盘空间不足"
          description: "实例 {{ $labels.instance }} 可用磁盘空间低于 15%。"

  - name: udake-application-alerts
    rules:
      - alert: BackendDown
        expr: up{job="udake-health",instance="backend:8000"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "后端服务不可用"
          description: "backend:8000 连续 2 分钟健康检查失败。"

      - alert: NginxDown
        expr: up{job="udake-health",instance="nginx:80"} == 0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Nginx 服务不可用"
          description: "nginx:80 连续 2 分钟健康检查失败。"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) / clamp_min(rate(http_requests_total[5m]), 1) > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "5xx 错误率过高"
          description: "5xx 比率连续 5 分钟超过 5%。"

      - alert: HighP95Latency
        expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 1.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "接口 P95 时延过高"
          description: "接口 P95 时延连续 5 分钟大于 1.5 秒。"

  - name: udake-business-alerts
    rules:
      - alert: HighExpiredKeyCount
        expr: sum(increase(udake_key_expired_total[1h])) > 100
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "密钥过期数量异常"
          description: "最近 1 小时过期密钥数量超过阈值 100。"

      - alert: HighEmailFailureRate
        expr: rate(udake_email_send_failed_total[15m]) / clamp_min(rate(udake_email_send_total[15m]), 1) > 0.2
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "邮件发送失败率过高"
          description: "最近 15 分钟邮件发送失败率超过 20%。"

      - alert: SchedulerTaskFailed
        expr: increase(udake_scheduler_task_failed_total[30m]) > 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "定时任务执行失败"
          description: "最近 30 分钟检测到定时任务失败。"

      - alert: SlowDatabaseQuery
        expr: histogram_quantile(0.95, sum(rate(udake_db_query_duration_seconds_bucket[5m])) by (le)) > 2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "数据库查询超时风险"
          description: "数据库查询 P95 连续 10 分钟超过 2 秒。"
