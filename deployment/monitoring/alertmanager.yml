global:
  resolve_timeout: 5m

route:
  receiver: default-webhook
  group_by: ["alertname", "service"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h
  routes:
    - matchers:
        - severity="critical"
      receiver: oncall-webhook

receivers:
  - name: default-webhook
    webhook_configs:
      - url: http://alert-webhook:5001/notify
        send_resolved: true

  - name: oncall-webhook
    webhook_configs:
      - url: http://alert-webhook:5001/oncall
        send_resolved: true
