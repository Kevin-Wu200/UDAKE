version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: udake-kriging-postgres
    environment:
      POSTGRES_DB: udake_kriging
      POSTGRES_USER: udake
      POSTGRES_PASSWORD: change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups/postgres:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U udake -d udake_kriging"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: udake-kriging-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    container_name: udake-kriging-backend
    build:
      context: ../../
      dockerfile: deployment/spatiotemporal_kriging/docker/backend.Dockerfile
    env_file:
      - ./.env
    volumes:
      - ../../services/backend/app/结果文件:/app/services/backend/app/结果文件
      - ./logging:/var/log/udake
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/health -H 'x-forwarded-proto: https' -H 'x-tls-version: TLSv1.3' -H 'host: localhost' || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    container_name: udake-kriging-frontend
    build:
      context: ../../
      dockerfile: deployment/spatiotemporal_kriging/docker/frontend.Dockerfile
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: udake-kriging-nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/spatiotemporal.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - ./logging/nginx:/var/log/nginx
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: udake-kriging-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
