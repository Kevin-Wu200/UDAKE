version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - HOST=0.0.0.0
      - PORT=8000
      - ANDROID_APK_DIR=/app/downloads/apk
      - WINDOWS_EXE_DIR=/app/downloads
      - MACOS_DMG_DIR=/app/downloads/macos
    volumes:
      - ../data_samples:/app/data_samples
      - ../services/backend/app/结果文件:/app/app/结果文件
      - ../android/app/build/outputs/apk/release:/app/downloads/apk:ro
      - ../release:/app/downloads:ro
      - ../release:/app/downloads/macos:ro
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "6060:6060"
    volumes:
      - ../frontend:/usr/share/nginx/html
      - ../apps/frontend/landing-page:/usr/share/nginx/landing-page
      - ./nginx反向代理配置.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    restart: unless-stopped
