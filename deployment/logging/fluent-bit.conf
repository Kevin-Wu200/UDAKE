[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/udake/*.log
    Tag               udake.app
    Parser            json
    DB                /var/log/fluent-bit-app.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[INPUT]
    Name              tail
    Path              /var/log/nginx/*.log
    Tag               udake.nginx
    Parser            nginx
    DB                /var/log/fluent-bit-nginx.db
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[FILTER]
    Name              modify
    Match             udake.*
    Add               env production
    Add               project udake

[OUTPUT]
    Name              stdout
    Match             udake.*

