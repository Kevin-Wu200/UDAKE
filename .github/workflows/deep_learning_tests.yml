name: Deep Learning Tests

on:
  push:
    paths:
      - 'deep_learning/**'
      - 'tests/deep_learning/**'
      - 'services/backend/app/dl_services/**'
  pull_request:
    paths:
      - 'deep_learning/**'
      - 'tests/deep_learning/**'
      - 'services/backend/app/dl_services/**'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run deep learning tests
        run: |
          pytest tests/deep_learning -q
