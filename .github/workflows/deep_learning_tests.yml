name: Deep Learning Tests

on:
  push:
    paths:
      - 'deep_learning/**'
      - 'tests/deep_learning/**'
      - 'services/backend/app/dl_services/**'
  pull_request:
    paths:
      - 'deep_learning/**'
      - 'tests/deep_learning/**'
      - 'services/backend/app/dl_services/**'

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin

      - name: Show Python environment
        run: |
          python --version
          pip --version
          python - <<'PY'
          import os
          import sys
          print(f"PYTHONPATH={os.getenv('PYTHONPATH', '')}")
          print(f"Executable={sys.executable}")
          PY

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Monitor resources before installation
        run: |
          echo "=== Memory Usage ==="
          free -h
          echo "=== Disk Usage ==="
          df -h

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy==1.24.3 scipy==1.11.4
          pip install GDAL==3.8.0

      - name: Install PyTorch (CPU version for CI)
        run: |
          pip install torch==2.0.1+cpu -f https://download.pytorch.org/whl/torch_stable.html
          pip install torch-scatter==2.1.2 -f https://data.pyg.org/whl/torch-2.0.1+cpu.html
          pip install torch-sparse==0.6.18 -f https://data.pyg.org/whl/torch-2.0.1+cpu.html

      - name: Install remaining dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov
          pip check

      - name: Monitor resources after installation
        run: |
          echo "=== Memory Usage ==="
          free -h
          echo "=== Disk Usage ==="
          df -h

      - name: Run deep learning tests with coverage
        env:
          PYTHONPATH: services
        run: |
          pytest tests/deep_learning -q -ra -vv --maxfail=1 \
            --cov=deep_learning \
            --cov=services/backend/app/dl_services \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80

      - name: Dump dependency snapshot on failure
        if: failure()
        run: |
          pip list
