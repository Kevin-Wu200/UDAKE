name: Deep Learning Tests

on:
  push:
    paths:
      - 'deep_learning/**'
      - 'tests/deep_learning/**'
      - 'services/backend/app/dl_services/**'
      - 'requirements.txt'
      - '.github/workflows/deep_learning_tests.yml'
  pull_request:
    paths:
      - 'deep_learning/**'
      - 'tests/deep_learning/**'
      - 'services/backend/app/dl_services/**'
      - 'requirements.txt'
      - '.github/workflows/deep_learning_tests.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-22.04
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin

      - name: Show Python environment
        run: |
          python --version
          pip --version
          python - <<'PY'
          import os
          import sys
          print(f"PYTHONPATH={os.getenv('PYTHONPATH', '')}")
          print(f"Executable={sys.executable}")
          PY

      - name: Monitor resources before installation
        run: |
          echo "=== Memory Usage ==="
          free -h
          echo "=== Disk Usage ==="
          df -h

      - name: Install base dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy==1.24.3 scipy==1.11.4
          GDAL_VERSION="$(gdal-config --version)"
          pip install "GDAL==${GDAL_VERSION}.*"

      - name: Install PyTorch (CPU version for CI)
        run: |
          pip install torch==2.0.1+cpu -f https://download.pytorch.org/whl/torch_stable.html
          pip install torch-scatter==2.1.2 -f https://data.pyg.org/whl/torch-2.0.1+cpu.html
          pip install torch-sparse==0.6.18 -f https://data.pyg.org/whl/torch-2.0.1+cpu.html

      - name: Install remaining dependencies
        run: |
          grep -viE '^\s*GDAL([<>=!~].*)?$' requirements.txt > /tmp/requirements-no-gdal.txt
          pip install -r /tmp/requirements-no-gdal.txt
          pip install pytest-cov
          pip check

      - name: Monitor resources after installation
        run: |
          echo "=== Memory Usage ==="
          free -h
          echo "=== Disk Usage ==="
          df -h

      - name: Run deep learning tests with coverage
        env:
          PYTHONPATH: services
        run: |
          pytest tests/deep_learning -q -ra -vv --maxfail=1 \
            --cov=deep_learning \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=79

      - name: Dump dependency snapshot on failure
        if: failure()
        run: |
          pip list
