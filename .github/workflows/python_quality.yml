name: Python Quality

on:
  push:
    paths:
      - 'services/backend/**'
      - 'deep_learning/**'
      - 'multi_objective_optimization/**'
      - 'realtime_interpolation/**'
      - 'spatial_data_mining/**'
      - 'time_series_analysis/**'
      - 'adaptive_sampling/**'
      - 'ai_extension/**'
      - 'uncertainty_dashboard/**'
      - 'tests/**'
      - 'conftest.py'
      - '.coveragerc'
      - 'requirements.txt'
      - '.github/workflows/python_quality.yml'
  pull_request:
    paths:
      - 'services/backend/**'
      - 'deep_learning/**'
      - 'multi_objective_optimization/**'
      - 'realtime_interpolation/**'
      - 'spatial_data_mining/**'
      - 'time_series_analysis/**'
      - 'adaptive_sampling/**'
      - 'ai_extension/**'
      - 'uncertainty_dashboard/**'
      - 'tests/**'
      - 'conftest.py'
      - '.coveragerc'
      - 'requirements.txt'
      - '.github/workflows/python_quality.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install ruff
        run: pip install ruff

      - name: Run Ruff lint
        run: |
          ruff check services/backend deep_learning multi_objective_optimization \
            realtime_interpolation spatial_data_mining time_series_analysis \
            adaptive_sampling ai_extension uncertainty_dashboard tests \
            --output-format=github

  coverage:
    name: Test Coverage Gate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true
      COVERAGE_THRESHOLD: '9'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgdal-dev gdal-bin

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install numpy==1.24.3 scipy==1.11.4
          GDAL_VERSION="$(gdal-config --version)"
          pip install "GDAL==${GDAL_VERSION}.*"
          grep -viE '^\s*(GDAL|torch-scatter|torch-sparse)([<>=!~].*)?$' requirements.txt > /tmp/requirements-no-gdal.txt
          pip install -r /tmp/requirements-no-gdal.txt
          # torch-scatter/torch-sparse 需要在 torch 安装后再构建，使用 --no-build-isolation
          pip install --no-build-isolation torch-scatter==2.1.2 torch-sparse==0.6.18
          pip install pytest-cov

      - name: Run tests with coverage
        env:
          PYTHONPATH: services
        run: |
          pytest tests/ -q \
            --cov=services/backend \
            --cov=deep_learning \
            --cov=multi_objective_optimization \
            --cov=realtime_interpolation \
            --cov=spatial_data_mining \
            --cov=time_series_analysis \
            --cov=adaptive_sampling \
            --cov=ai_extension \
            --cov=uncertainty_dashboard \
            --cov-config=.coveragerc \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=${{ env.COVERAGE_THRESHOLD }} \
            --ignore=tests/deep_learning \
            --ignore=tests/e2e \
            --ignore=tests/performance \
            -ra

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: coverage.xml
          if-no-files-found: ignore
