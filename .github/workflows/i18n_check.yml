name: Frontend I18n Check

on:
  push:
    paths:
      - 'apps/frontend/**'
      - 'scripts/i18n-check.js'
      - 'package.json'
      - '.github/workflows/i18n_check.yml'
  pull_request:
    paths:
      - 'apps/frontend/**'
      - 'scripts/i18n-check.js'
      - 'package.json'
      - '.github/workflows/i18n_check.yml'
  schedule:
    - cron: '0 2 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  i18n-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      I18N_CHECK_DEBUG: '1'
      I18N_STRICT_ALL_LOCALES: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Show runtime environment
        run: |
          node -v
          npm -v
          uname -a

      - name: Install dependencies
        run: npm ci --no-audit --prefer-offline

      - name: Verify key i18n files
        run: |
          test -f apps/frontend/js/i18n/config.ts
          test -f apps/frontend/js/utils/I18n.ts
          ls -la apps/frontend/js/i18n apps/frontend/js/utils

      - name: Run i18n quality check
        run: npm run i18n:check:strict

      - name: Upload i18n reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-report
          path: reports/i18n
          if-no-files-found: ignore
