name: i18n TMS Check

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/frontend/js/utils/I18n.ts'
      - 'apps/frontend/js/locales/*.json'
      - 'scripts/i18n-tms.js'
      - 'translation-management/**'
      - '.github/workflows/i18n_tms_check.yml'
  push:
    branches: [main, master]
    paths:
      - 'apps/frontend/js/utils/I18n.ts'
      - 'apps/frontend/js/locales/*.json'
      - 'scripts/i18n-tms.js'
      - 'translation-management/**'
      - '.github/workflows/i18n_tms_check.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Export TMS source files
        run: npm run i18n:tms:export

      - name: Validate locale completeness
        run: npm run i18n:tms:validate:strict

      - name: Upload TMS reports
        uses: actions/upload-artifact@v4
        with:
          name: i18n-tms-report
          path: translation-management/reports
