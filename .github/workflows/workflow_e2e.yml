name: Workflow E2E

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/admin-frontend/**'
      - 'tests/e2e/workflow*.test.ts'
      - 'tests/e2e/support/**'
      - 'configs/playwright.config.ts'
      - 'configs/playwright.workflow.config.ts'
      - 'configs/playwright.global-setup.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/e2e-flakiness-report.js'
      - '.github/workflows/workflow_e2e.yml'
  pull_request:
    paths:
      - 'apps/admin-frontend/**'
      - 'tests/e2e/workflow*.test.ts'
      - 'tests/e2e/support/**'
      - 'configs/playwright.config.ts'
      - 'configs/playwright.workflow.config.ts'
      - 'configs/playwright.global-setup.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'scripts/e2e-flakiness-report.js'
      - '.github/workflows/workflow_e2e.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workflow-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            apps/admin-frontend/package-lock.json

      - name: Install dependencies
        run: |
          npm ci --no-audit --prefer-offline
          npm ci --no-audit --prefer-offline --prefix apps/admin-frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run workflow E2E tests
        run: npm run test:e2e:workflow

      - name: Generate flaky report
        if: always()
        run: npm run test:e2e:report

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workflow-e2e-artifacts
          path: |
            playwright-report
            playwright-report-workflow
            test-results
            test-results.json
            test-results-workflow.json
            test-results.junit.xml
            test-results-workflow.junit.xml
          if-no-files-found: ignore
