<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="test.mapEngine.title">地图引擎测试工具 - UDAKE</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f7;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 28px;
            color: #1d1d1f;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #86868b;
            font-size: 16px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .card h2 {
            font-size: 20px;
            color: #1d1d1f;
            margin-bottom: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item {
            padding: 15px;
            background: #f5f5f7;
            border-radius: 8px;
        }

        .info-label {
            font-size: 12px;
            color: #86868b;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #007AFF;
            color: white;
        }

        .btn-primary:hover {
            background: #0051D5;
        }

        .btn-secondary {
            background: #f5f5f7;
            color: #1d1d1f;
        }

        .btn-secondary:hover {
            background: #e8e8ed;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #console {
            background: #1d1d1f;
            color: #f5f5f7;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 13px;
            line-height: 1.6;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .test-result {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .test-result.passed {
            background: #d1f4e0;
            color: #0a6e31;
        }

        .test-result.failed {
            background: #ffd3d3;
            color: #c41e3a;
        }

        .test-result.pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.success {
            background: #34c759;
            color: white;
        }

        .status-badge.error {
            background: #ff3b30;
            color: white;
        }

        .status-badge.warning {
            background: #ff9500;
            color: white;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #f5f5f7;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-fill {
            height: 100%;
            background: #007AFF;
            transition: width 0.3s;
        }

        #map-container {
            width: 100%;
            height: 400px;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .hidden {
            display: none;
        }
    </style>

    <!-- ArcGIS API -->
    <link rel="stylesheet" href="https://js.arcgis.com/4.28/esri/themes/light/main.css">
    <script src="https://js.arcgis.com/4.28/"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 data-i18n="test.mapEngine.heading">🧪 地图引擎测试工具</h1>
            <p class="subtitle" data-i18n="test.mapEngine.subtitle">UDAKE 地图引擎切换功能测试套件</p>
        </div>

        <div class="card">
            <h2 data-i18n="test.mapEngine.systemInfo">系统信息</h2>
            <div class="info-grid">
                <div class="info-item">
                    <div class="info-label" data-i18n="test.mapEngine.currentEngine">当前地图引擎</div>
                    <div class="info-value" id="current-engine" data-i18n="test.mapEngine.loading">加载中...</div>
                </div>
                <div class="info-item">
                    <div class="info-label" data-i18n="test.mapEngine.browser">浏览器</div>
                    <div class="info-value" id="browser-info">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label" data-i18n="test.mapEngine.testStatus">测试状态</div>
                    <div class="info-value" id="test-status">
                        <span class="status-badge warning" data-i18n="test.mapEngine.notStarted">未开始</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 data-i18n="test.mapEngine.control">测试控制</h2>
            <div class="button-group">
                <button class="btn btn-primary" id="run-tests-btn" data-i18n="test.mapEngine.runAllTests">运行所有测试</button>
                <button class="btn btn-secondary" id="clear-console-btn" data-i18n="test.mapEngine.clearConsole">清空控制台</button>
                <button class="btn btn-secondary" id="export-report-btn" disabled data-i18n="test.mapEngine.exportReport">导出报告</button>
            </div>
            <div class="progress-bar hidden" id="progress-bar">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="card">
            <h2 data-i18n="test.mapEngine.mapPreview">地图预览</h2>
            <div id="map-container"></div>
        </div>

        <div class="card">
            <h2 data-i18n="test.mapEngine.results">测试结果</h2>
            <div id="test-results"></div>
        </div>

        <div class="card">
            <h2 data-i18n="test.mapEngine.consoleOutput">控制台输出</h2>
            <div id="console"></div>
        </div>
    </div>

    <script src="./test-page-i18n.js"></script>
    <script type="module">
        import { initializeMap } from './js/地图初始化.js';
        import { MapEngineTestHelper } from './js/utils/MapEngineTestHelper.js';
        import { MapConfig } from './js/config/map.config.js';

        let adapter = null;
        let testHelper = null;
        let testReport = null;
        let currentLocale = 'zh-CN';

        function t(key, params = {}) {
            const translate = window.TestPageI18n?.t;
            const locale = window.TestPageI18n?.getLocale?.() || currentLocale;
            const template = typeof translate === 'function' ? translate(key, locale) : key;
            return template.replace(/\{(\w+)\}/g, (_, token) => {
                if (Object.prototype.hasOwnProperty.call(params, token)) {
                    return String(params[token]);
                }
                return `{${token}}`;
            });
        }

        // 重定向 console.log 到页面
        const consoleDiv = document.getElementById('console');
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;

        function appendToConsole(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const prefix = type === 'error' ? '❌' : type === 'warn' ? '⚠️' : '📝';
            consoleDiv.textContent += `[${timestamp}] ${prefix} ${message}\n`;
            consoleDiv.scrollTop = consoleDiv.scrollHeight;
        }

        console.log = (...args) => {
            originalLog(...args);
            appendToConsole(args.join(' '), 'log');
        };

        console.error = (...args) => {
            originalError(...args);
            appendToConsole(args.join(' '), 'error');
        };

        console.warn = (...args) => {
            originalWarn(...args);
            appendToConsole(args.join(' '), 'warn');
        };

        // 初始化
        async function init() {
            try {
                // 显示系统信息
                const engine = MapConfig.getProvider();
                document.getElementById('current-engine').textContent = engine === 'geoscene'
                    ? t('test.mapEngine.engine.geoscene')
                    : t('test.mapEngine.engine.tianditu');
                document.getElementById('browser-info').textContent = navigator.userAgent.split(' ').pop();

                // 初始化地图
                console.log(t('test.mapEngine.log.initializingMap'));
                adapter = await initializeMap('map-container');
                console.log(t('test.mapEngine.log.mapInitialized'));

                // 初始化测试工具
                testHelper = new MapEngineTestHelper();
                await testHelper.init();

                // 启用测试按钮
                document.getElementById('run-tests-btn').disabled = false;

            } catch (error) {
                console.error(t('test.mapEngine.log.initFailed'), error);
                document.getElementById('test-status').innerHTML = `<span class="status-badge error">${t('test.mapEngine.status.initFailed')}</span>`;
            }
        }

        // 运行测试
        async function runTests() {
            const runBtn = document.getElementById('run-tests-btn');
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            const testResultsDiv = document.getElementById('test-results');
            const statusDiv = document.getElementById('test-status');

            runBtn.disabled = true;
            progressBar.classList.remove('hidden');
            testResultsDiv.innerHTML = '';
            statusDiv.innerHTML = `<span class="status-badge warning">${t('test.mapEngine.status.testing')}</span>`;

            try {
                // 运行测试
                const results = await testHelper.runAllTests(adapter);
                testReport = testHelper.generateReport();

                // 更新进度条
                progressFill.style.width = '100%';

                // 显示测试结果
                testHelper.testResults.forEach(result => {
                    const div = document.createElement('div');
                    div.className = `test-result ${result.status}`;
                    div.innerHTML = `
                        <span>${result.status === 'passed' ? '✅' : '❌'}</span>
                        <div>
                            <strong>${result.test}</strong>
                            <div style="font-size: 14px; margin-top: 5px;">${result.message}</div>
                        </div>
                    `;
                    testResultsDiv.appendChild(div);
                });

                // 更新状态
                const passRate = (results.passed / results.total * 100).toFixed(1);
                if (results.failed === 0) {
                    statusDiv.innerHTML = `<span class="status-badge success">${t('test.mapEngine.status.allPassed', { passRate })}</span>`;
                } else {
                    statusDiv.innerHTML = `<span class="status-badge error">${t('test.mapEngine.status.failed', { failed: results.failed, passRate })}</span>`;
                }

                // 启用导出按钮
                document.getElementById('export-report-btn').disabled = false;

            } catch (error) {
                console.error(t('test.mapEngine.log.runFailed'), error);
                statusDiv.innerHTML = `<span class="status-badge error">${t('test.mapEngine.status.runFailed')}</span>`;
            } finally {
                runBtn.disabled = false;
                setTimeout(() => {
                    progressBar.classList.add('hidden');
                    progressFill.style.width = '0%';
                }, 1000);
            }
        }

        // 清空控制台
        function clearConsole() {
            consoleDiv.textContent = '';
            console.log(t('test.mapEngine.log.consoleCleared'));
        }

        // 导出报告
        function exportReport() {
            if (!testReport) {
                alert(t('test.mapEngine.alert.noReport'));
                return;
            }

            const blob = new Blob([JSON.stringify(testReport, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `map-engine-test-report-${Date.now()}.json`;
            a.click();
            URL.revokeObjectURL(url);

            console.log(t('test.mapEngine.log.reportExported'));
        }

        // 绑定事件
        document.getElementById('run-tests-btn').addEventListener('click', runTests);
        document.getElementById('clear-console-btn').addEventListener('click', clearConsole);
        document.getElementById('export-report-btn').addEventListener('click', exportReport);

        window.addEventListener('udake-test-language-change', (event) => {
            currentLocale = event.detail?.locale || currentLocale;
        });

        // 启动
        init();
    </script>
</body>
</html>
