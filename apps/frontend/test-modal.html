<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弹窗测试</title>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/主题变量.css">
    <link rel="stylesheet" href="css/组件样式.css">
    <link rel="stylesheet" href="css/深色模式.css">

    <style>
        body {
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }
        .test-container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            margin-bottom: 20px;
        }
        .btn {
            margin: 10px 0;
        }
        #console-output {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
            font-family: monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #007aff;
        }
        .log-error {
            border-left-color: #ff3b30;
            color: #ff3b30;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h1>弹窗功能测试</h1>
        <button id="test-btn" class="btn btn-primary">测试弹窗</button>
        <div id="console-output"></div>
    </div>

    <script type="module">
        import { DataImportModal } from './js/components/DataImportModal.js';
        import { FieldMatcher } from './js/utils/fieldMatcher.js';

        // 拦截 console.log 和 console.error
        const consoleOutput = document.getElementById('console-output');
        const originalLog = console.log;
        const originalError = console.error;

        console.log = function(...args) {
            originalLog.apply(console, args);
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.textContent = args.join(' ');
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };

        console.error = function(...args) {
            originalError.apply(console, args);
            const entry = document.createElement('div');
            entry.className = 'log-entry log-error';
            entry.textContent = 'ERROR: ' + args.join(' ');
            consoleOutput.appendChild(entry);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        };

        // 测试数据
        const testParseResult = {
            geojson: {
                type: 'FeatureCollection',
                features: [
                    {
                        type: 'Feature',
                        geometry: {
                            type: 'Point',
                            coordinates: [116.4074, 39.9042]
                        },
                        properties: {
                            value: 25.5,
                            name: '采样点1'
                        }
                    }
                ]
            },
            crsInfo: {
                detected: true,
                projectedName: 'EPSG:4326',
                projectedEPSG: 4326,
                geographicName: 'WGS84',
                geographicEPSG: 4326
            },
            fields: ['value', 'name'],
            pointCount: 1
        };

        // 测试按钮
        document.getElementById('test-btn').addEventListener('click', () => {
            console.log('=== 开始测试弹窗 ===');

            try {
                const modal = new DataImportModal((data) => {
                    console.log('确认回调被调用:', data);
                }, null);

                console.log('DataImportModal 实例已创建');
                modal.show(testParseResult);
                console.log('=== 测试完成 ===');
            } catch (error) {
                console.error('测试失败:', error);
                console.error('错误堆栈:', error.stack);
            }
        });

        console.log('测试页面已加载');
    </script>
</body>
</html>
