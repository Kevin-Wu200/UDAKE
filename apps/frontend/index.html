<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能不确定性驱动空间决策平台</title>

    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/theme-variables.css">

    <!-- 预加载关键资源 -->
    <link rel="preload" href="css/splash-screen.css" as="style">
    <link rel="stylesheet" href="css/splash-screen.css">
    <link rel="preload" href="css/skeleton-loader.css" as="style">
    <link rel="stylesheet" href="css/skeleton-loader.css">
    <link rel="preload" href="css/startup-error.css" as="style">
    <link rel="stylesheet" href="css/startup-error.css">
    <link rel="preload" href="css/layout-styles.css" as="style">
    <link rel="preload" href="css/component-styles.css" as="style">
    <link rel="preload" href="css/animation-styles.css" as="style">

    <!-- 动态加载 ArcGIS API -->
    <script>
        // 延迟加载 ArcGIS API
        function loadArcGISAPI() {
            return new Promise((resolve, reject) => {
                // 检查是否已经加载
                if (window.require) {
                    resolve();
                    return;
                }

                // 动态加载 ArcGIS API
                const script = document.createElement('script');
                script.src = 'https://js.arcgis.com/4.28/';
                script.onload = () => {
                    console.log('ArcGIS API 加载完成');
                    resolve();
                };
                script.onerror = () => {
                    console.error('ArcGIS API 加载失败');
                    reject(new Error('ArcGIS API 加载失败'));
                };
                document.head.appendChild(script);

                // 加载样式
                const link = document.createElement('link');
                link.rel = 'stylesheet';
                link.href = 'https://js.arcgis.com/4.28/esri/themes/light/main.css';
                document.head.appendChild(link);
            });
        }
    </script>
    <link rel="stylesheet" href="css/layout-styles.css">
    <link rel="stylesheet" href="css/component-styles.css">
    <link rel="stylesheet" href="css/animation-styles.css">
    <link rel="stylesheet" href="css/dark-mode.css">
    <link rel="stylesheet" href="css/custom-select.css">
    <link rel="stylesheet" href="css/progress-detail.css">
    <link rel="stylesheet" href="css/resource-monitor.css">
    <link rel="stylesheet" href="css/onboarding-guide.css">
    <link rel="stylesheet" href="css/cache-management.css">
    <link rel="stylesheet" href="css/offline-banner.css">
    <link rel="stylesheet" href="css/kriging-3d.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航栏 -->
        <header class="header">
            <div class="header-content">
                <div class="header-left"></div>
                <h1 class="title">
                    <span class="title-zh">智能不确定性驱动空间决策平台</span>
                    <span class="title-en">UDAKE</span>
                </h1>
                <div class="header-right">
                    <button id="settings-btn" class="btn btn-secondary" title="设置">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                    </button>
                    <button id="new-project-btn" class="btn btn-primary">新建项目</button>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- 左侧控制面板 -->
            <aside class="sidebar">
                <!-- 项目面板 -->
                <div class="panel" id="project-panel" style="display: none;">
                    <h2 class="panel-title">当前项目</h2>
                    <div class="panel-content" id="project-content">
                        <!-- 采样组件将动态插入这里 -->
                    </div>
                </div>

                <div class="panel">
                    <h2 class="panel-title">数据上传</h2>
                    <div class="panel-content">
                        <div id="file-picker" class="file-picker">
                            <span id="file-name">点击选择 GeoJSON 文件</span>
                            <input type="file"
                                   id="file-input"
                                   accept=".geojson,.json"
                                   class="file-input">
                        </div>
                        <button id="upload-btn" class="btn btn-primary">上传数据</button>
                        <div id="upload-status" class="status-message"></div>
                    </div>
                </div>

                <div class="panel">
                    <h2 class="panel-title">插值参数</h2>
                    <div class="panel-content">
                        <div class="form-group">
                            <label>克里金方法</label>
                            <select id="kriging-method" class="select">
                                <option value="ordinary">普通克里金</option>
                                <option value="universal">泛克里金</option>
                                <option value="block">分块克里金</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>变异函数模型</label>
                            <select id="variogram-model" class="select">
                                <option value="spherical">球状模型</option>
                                <option value="exponential">指数模型</option>
                                <option value="gaussian">高斯模型</option>
                            </select>
                        </div>

                        <div class="form-group slider-group">
                            <label>网格分辨率 <span class="param-value" id="grid-resolution-value">100</span></label>
                            <input type="range" id="grid-resolution-slider" class="slider" min="50" max="500" value="100" step="10">
                            <input type="number" id="grid-resolution" class="input" value="100" min="50" max="500" step="10">
                            <span class="param-description">影响输出栅格的精细度，值越大越精细但计算越慢</span>
                        </div>

                        <div class="form-group slider-group">
                            <label>滞后数 <span class="param-value" id="nlags-value">12</span></label>
                            <input type="range" id="nlags-slider" class="slider" min="6" max="24" value="12" step="1">
                            <input type="number" id="nlags" class="input" value="12" min="6" max="24" step="1">
                            <span class="param-description">变异函数计算时的距离分组数量</span>
                        </div>

                        <div class="form-group slider-group">
                            <label>变差值 <span class="param-value" id="nugget-value">0.0</span></label>
                            <input type="range" id="nugget-slider" class="slider" min="0" max="1" value="0" step="0.05">
                            <input type="number" id="nugget" class="input" value="0" min="0" max="1" step="0.05">
                            <span class="param-description">表示测量误差或微观变异，值越小拟合越好</span>
                        </div>

                        <div class="form-group slider-group">
                            <label>基台值 <span class="param-value" id="sill-value">1.0</span></label>
                            <input type="range" id="sill-slider" class="slider" min="0" max="10" value="1" step="0.1">
                            <input type="number" id="sill" class="input" value="1" min="0" max="10" step="0.1">
                            <span class="param-description">变异函数的渐近值，表示总方差</span>
                        </div>

                        <div class="form-group slider-group">
                            <label>范围值 <span class="param-value" id="range-value">10.0</span></label>
                            <input type="range" id="range-slider" class="slider" min="0" max="100" value="10" step="1">
                            <input type="number" id="range" class="input" value="10" min="0" max="100" step="1">
                            <span class="param-description">变异函数达到基台值时的距离，表示空间相关范围</span>
                        </div>

                        <button id="start-kriging-btn" class="btn btn-primary" disabled>开始插值</button>
                    </div>
                </div>

                <div class="panel">
                    <h2 class="panel-title">任务状态</h2>
                    <div class="panel-content">
                        <div id="task-status" class="task-status">
                            <p>暂无任务</p>
                        </div>
                        <div id="progress-bar" class="progress-bar" style="display: none;">
                            <div class="progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div class="panel" id="export-panel" style="display: none;">
                    <h2 class="panel-title">结果导出</h2>
                    <div class="panel-content">
                        <div class="export-section">
                            <h3 class="export-subtitle">预测结果</h3>
                            <div class="export-buttons">
                                <button class="btn btn-export" id="export-prediction-geojson">导出 GeoJSON</button>
                                <button class="btn btn-export" id="export-prediction-shp">导出 Shapefile</button>
                                <button class="btn btn-export" id="export-prediction-tif">导出 GeoTIFF</button>
                            </div>
                        </div>
                        <div class="export-section">
                            <h3 class="export-subtitle">方差结果</h3>
                            <div class="export-buttons">
                                <button class="btn btn-export" id="export-variance-geojson">导出 GeoJSON</button>
                                <button class="btn btn-export" id="export-variance-shp">导出 Shapefile</button>
                                <button class="btn btn-export" id="export-variance-tif">导出 GeoTIFF</button>
                            </div>
                        </div>
                        <div id="export-status" class="status-message"></div>
                    </div>
                </div>

                <div class="panel">
                    <h2 class="panel-title">图层控制</h2>
                    <div class="panel-content">
                        <div class="layer-control">
                            <label class="checkbox-label">
                                <input type="checkbox" id="layer-points" checked>
                                <span>采样点</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="layer-prediction">
                                <span>预测栅格</span>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="layer-variance">
                                <span>方差栅格</span>
                            </label>
                        </div>
                    </div>
                </div>

                <!-- 3D克里金面板 -->
                <div class="panel" id="kriging3d-section">
                    <h2 class="panel-title" style="cursor:pointer;" onclick="document.getElementById('kriging3d-container').style.display=document.getElementById('kriging3d-container').style.display==='none'?'block':'none'">
                        3D克里金插值 ▾
                    </h2>
                    <div id="kriging3d-container" style="display:none;"></div>
                </div>

                <div class="panel cache-status-panel" id="cache-status-panel">
                    <h2 class="panel-title">缓存状态</h2>
                    <div class="panel-content">
                        <div class="cache-status-item">
                            <div class="cache-status-label">
                                <span class="cache-status-icon" id="cache-network-icon"></span>
                                <span class="cache-status-text">网络状态</span>
                            </div>
                            <span class="cache-status-value" id="cache-network-status">检测中...</span>
                        </div>
                        <div class="cache-status-item">
                            <div class="cache-status-label">
                                <span class="cache-status-icon storage-icon">💾</span>
                                <span class="cache-status-text">存储使用</span>
                            </div>
                            <div class="cache-storage-bar">
                                <div class="cache-storage-fill" id="cache-storage-fill"></div>
                            </div>
                            <span class="cache-storage-text" id="cache-storage-text">0 B / 50 MB</span>
                        </div>
                        <div class="cache-status-item">
                            <div class="cache-status-label">
                                <span class="cache-status-icon sync-icon">🔄</span>
                                <span class="cache-status-text">待同步</span>
                            </div>
                            <span class="cache-status-value" id="cache-pending-count">0</span>
                        </div>
                        <button class="btn btn-secondary btn-sm" id="open-cache-management">
                            管理缓存
                        </button>
                    </div>
                </div>
            </aside>

            <!-- 地图容器 -->
            <div class="map-container">
                <div id="viewDiv" class="map-view"></div>
                <div id="info-panel" class="info-panel" style="display: none;">
                    <h3>点击信息</h3>
                    <div id="info-content"></div>
                </div>

                <!-- 右侧侧边栏 -->
                <aside class="right-sidebar" id="right-sidebar">
                    <div class="right-sidebar-content">
                        <!-- 采样建议面板将动态插入这里 -->
                    </div>
                </aside>

                <!-- 侧边栏切换按钮 -->
                <button class="sidebar-toggle" id="sidebar-toggle" title="切换侧边栏"></button>
            </div>
        </main>
    </div>

    <!-- JavaScript模块 -->
    <script type="module" src="js/主程序.ts"></script>
</body>
</html>
