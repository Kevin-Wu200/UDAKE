<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务管理器测试</title>
    <link rel="stylesheet" href="css/task-manager.css">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #f5f5f5;
        }

        .test-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .test-header {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .test-header h1 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .test-controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 15px;
        }

        .test-btn {
            padding: 10px 20px;
            background: #2196F3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.3s ease;
        }

        .test-btn:hover {
            background: #1976D2;
        }

        .test-btn.danger {
            background: #f44336;
        }

        .test-btn.danger:hover {
            background: #d32f2f;
        }

        .test-btn.success {
            background: #4CAF50;
        }

        .test-btn.success:hover {
            background: #388E3C;
        }

        .test-panel {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            min-height: 600px;
        }

        .log-container {
            background: #f5f5f5;
            border-radius: 4px;
            padding: 15px;
            margin-top: 20px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .log-entry.info {
            color: #2196F3;
        }

        .log-entry.success {
            color: #4CAF50;
        }

        .log-entry.error {
            color: #f44336;
        }

        .log-entry.warning {
            color: #ff9800;
        }

        .stats-display {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-card {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 600;
            color: #2196F3;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <div class="test-header">
            <h1>任务管理器测试</h1>
            <p>测试后台任务管理、通知功能和任务持久化</p>

            <div class="test-controls">
                <button class="test-btn" onclick="testCreateTask()">创建测试任务</button>
                <button class="test-btn" onclick="testCreateBatchTasks()">创建批量任务</button>
                <button class="test-btn success" onclick="testGetStats()">查看统计</button>
                <button class="test-btn danger" onclick="testClearHistory()">清空历史</button>
                <button class="test-btn" onclick="testNotification()">测试通知</button>
            </div>

            <div class="stats-display" id="stats-display">
                <div class="stat-card">
                    <div class="stat-value" id="stat-total">0</div>
                    <div class="stat-label">总任务数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-pending">0</div>
                    <div class="stat-label">待处理</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-running">0</div>
                    <div class="stat-label">运行中</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-completed">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="stat-failed">0</div>
                    <div class="stat-label">失败</div>
                </div>
            </div>
        </div>

        <div class="test-panel">
            <h2>任务管理面板</h2>
            <div id="task-panel-container"></div>
        </div>

        <div class="test-header">
            <h2>测试日志</h2>
            <div class="log-container" id="log-container"></div>
        </div>
    </div>

    <script type="module">
        // 导入任务管理器和相关模块
        import TaskManager from './js/managers/TaskManager.js';
        import { TaskManagementPanel } from './js/components/TaskManagementPanel.js';
        import { LocalNotifications } from 'https://cdn.jsdelivr.net/npm/@capacitor/local-notifications@8.0.2/dist/esm/index.js';

        let taskManager;
        let taskPanel;
        let taskCounter = 0;

        // 初始化
        async function init() {
            log('正在初始化任务管理器...', 'info');

            try {
                // 初始化任务管理器
                taskManager = TaskManager.getInstance({
                    enablePersistence: true,
                    enableNotifications: true,
                    maxRetries: 3,
                    taskTimeout: 300000
                });

                // 注册测试任务执行器
                taskManager.registerExecutor('test', {
                    async execute(task, onProgress) {
                        log(`开始执行测试任务: ${task.id}`, 'info');

                        for (let i = 0; i <= 100; i += 10) {
                            await new Promise(resolve => setTimeout(resolve, 500));
                            onProgress(i);
                        }

                        const result = {
                            message: '测试任务完成',
                            timestamp: new Date().toISOString()
                        };

                        log(`测试任务完成: ${task.id}`, 'success');
                        return result;
                    }
                });

                // 监听任务事件
                setupTaskListeners();

                // 初始化任务面板
                const container = document.getElementById('task-panel-container');
                taskPanel = new TaskManagementPanel(container);

                // 更新统计
                await updateStats();

                log('任务管理器初始化完成', 'success');
            } catch (error) {
                log(`初始化失败: ${error.message}`, 'error');
                console.error(error);
            }
        }

        // 设置任务监听器
        function setupTaskListeners() {
            taskManager.on('created', (event) => {
                log(`任务创建: ${event.task.id} - ${event.task.name}`, 'info');
                updateStats();
            });

            taskManager.on('started', (event) => {
                log(`任务开始: ${event.task.id}`, 'info');
                updateStats();
            });

            taskManager.on('progress', (event) => {
                log(`任务进度: ${event.task.id} - ${event.task.progress}%`, 'info');
            });

            taskManager.on('completed', (event) => {
                log(`任务完成: ${event.task.id}`, 'success');
                updateStats();
            });

            taskManager.on('failed', (event) => {
                log(`任务失败: ${event.task.id} - ${event.task.error}`, 'error');
                updateStats();
            });

            taskManager.on('cancelled', (event) => {
                log(`任务取消: ${event.task.id}`, 'warning');
                updateStats();
            });

            taskManager.on('paused', (event) => {
                log(`任务暂停: ${event.task.id}`, 'warning');
                updateStats();
            });

            taskManager.on('resumed', (event) => {
                log(`任务恢复: ${event.task.id}`, 'info');
                updateStats();
            });
        }

        // 创建测试任务
        async function testCreateTask() {
            taskCounter++;
            const taskName = `测试任务 ${taskCounter}`;

            try {
                const task = await taskManager.createTask(
                    'test',
                    taskName,
                    { testId: taskCounter },
                    {
                        description: '这是一个测试任务',
                        priority: 'normal',
                        notifyOnCompletion: true,
                        estimatedDuration: 10000
                    }
                );

                log(`成功创建任务: ${task.id}`, 'success');
            } catch (error) {
                log(`创建任务失败: ${error.message}`, 'error');
            }
        }

        // 创建批量任务
        async function testCreateBatchTasks() {
            const count = 5;

            try {
                for (let i = 0; i < count; i++) {
                    taskCounter++;
                    const taskName = `批量任务 ${taskCounter}`;

                    await taskManager.createTask(
                        'test',
                        taskName,
                        { batchId: Date.now(), index: i },
                        {
                            description: '批量测试任务',
                            priority: i === 0 ? 'high' : 'normal',
                            notifyOnCompletion: false,
                            estimatedDuration: 8000
                        }
                    );
                }

                log(`成功创建 ${count} 个批量任务`, 'success');
            } catch (error) {
                log(`创建批量任务失败: ${error.message}`, 'error');
            }
        }

        // 获取统计信息
        async function testGetStats() {
            try {
                const stats = await taskManager.getStats();

                log('任务统计信息:', 'info');
                log(`  总任务数: ${stats.total}`, 'info');
                log(`  待处理: ${stats.pending}`, 'info');
                log(`  运行中: ${stats.running}`, 'info');
                log(`  已完成: ${stats.completed}`, 'info');
                log(`  失败: ${stats.failed}`, 'info');
                log(`  平均时长: ${(stats.avgDuration / 1000).toFixed(2)}秒`, 'info');
                log(`  成功率: ${stats.successRate.toFixed(1)}%`, 'info');

                updateStats();
            } catch (error) {
                log(`获取统计信息失败: ${error.message}`, 'error');
            }
        }

        // 清空历史
        async function testClearHistory() {
            try {
                await taskManager.clearHistory();
                log('历史记录已清空', 'success');
                updateStats();
            } catch (error) {
                log(`清空历史失败: ${error.message}`, 'error');
            }
        }

        // 测试通知
        async function testNotification() {
            try {
                // 请求通知权限
                const permission = await LocalNotifications.requestPermissions();

                if (permission.display !== 'granted') {
                    log('通知权限未授予', 'error');
                    return;
                }

                // 发送测试通知
                await LocalNotifications.schedule({
                    notifications: [
                        {
                            id: Date.now(),
                            title: '测试通知',
                            body: '这是一条测试通知消息',
                            schedule: { at: new Date(Date.now() + 1000) },
                            sound: 'default'
                        }
                    ]
                });

                log('测试通知已发送', 'success');
            } catch (error) {
                log(`发送通知失败: ${error.message}`, 'error');
            }
        }

        // 更新统计显示
        async function updateStats() {
            try {
                const stats = await taskManager.getStats();

                document.getElementById('stat-total').textContent = stats.total;
                document.getElementById('stat-pending').textContent = stats.pending;
                document.getElementById('stat-running').textContent = stats.running;
                document.getElementById('stat-completed').textContent = stats.completed;
                document.getElementById('stat-failed').textContent = stats.failed;
            } catch (error) {
                log(`更新统计失败: ${error.message}`, 'error');
            }
        }

        // 日志函数
        function log(message, type = 'info') {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;

            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;

            container.appendChild(entry);
            container.scrollTop = container.scrollHeight;

            // 限制日志数量
            while (container.children.length > 100) {
                container.removeChild(container.firstChild);
            }
        }

        // 暴露到全局
        window.testCreateTask = testCreateTask;
        window.testCreateBatchTasks = testCreateBatchTasks;
        window.testGetStats = testGetStats;
        window.testClearHistory = testClearHistory;
        window.testNotification = testNotification;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
