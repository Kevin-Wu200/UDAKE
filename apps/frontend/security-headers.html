<!DOCTYPE html>
<!--
    安全头部配置建议
    在服务器配置文件中添加以下头部以提高安全性
-->

<!-- Apache (.htaccess) -->
<!--
<IfModule mod_headers.c>
    # Content Security Policy
    Header set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.arcgis.com https://webapi.amap.com https://webst01.is.autonavi.com; style-src 'self' 'unsafe-inline' https://js.arcgis.com https://webapi.amap.com; img-src 'self' data: https://*.arcgis.com https://*.autonavi.com https://*.amap.com; connect-src 'self' http://localhost:* https://*.arcgis.com https://*.amap.com; font-src 'self' data:; frame-src 'self' https://*.arcgis.com https://*.amap.com; base-uri 'self'; form-action 'self';"

    # X-Frame-Options
    Header set X-Frame-Options "DENY"

    # X-Content-Type-Options
    Header set X-Content-Type-Options "nosniff"

    # X-XSS-Protection
    Header set X-XSS-Protection "1; mode=block"

    # Referrer-Policy
    Header set Referrer-Policy "strict-origin-when-cross-origin"

    # Permissions-Policy
    Header set Permissions-Policy "geolocation=(self), camera=(self), microphone=(self)"

    # Strict-Transport-Security (仅 HTTPS)
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
</IfModule>
-->

<!-- Nginx -->
<!--
server {
    # Content Security Policy
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.arcgis.com https://webapi.amap.com https://webst01.is.autonavi.com; style-src 'self' 'unsafe-inline' https://js.arcgis.com https://webapi.amap.com; img-src 'self' data: https://*.arcgis.com https://*.autonavi.com https://*.amap.com; connect-src 'self' http://localhost:* https://*.arcgis.com https://*.amap.com; font-src 'self' data:; frame-src 'self' https://*.arcgis.com https://*.amap.com; base-uri 'self'; form-action 'self';" always;

    # X-Frame-Options
    add_header X-Frame-Options "DENY" always;

    # X-Content-Type-Options
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection
    add_header X-XSS-Protection "1; mode=block" always;

    # Referrer-Policy
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy
    add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=(self)" always;

    # Strict-Transport-Security (仅 HTTPS)
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
}
-->
