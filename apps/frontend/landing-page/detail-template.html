<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />

    <title>UDAKE - 详情页模板</title>
    <link rel="stylesheet" href="./css/variables.css" />

  </head>
  <body class="page-detail" data-feature="featureKey">
    <div class="page-shell">
      <header class="site-header detail-header">
        <a class="brand" href="./index.html#hero" aria-label="UDAKE Home">
          <img src="./assets/logo.png" alt="UDAKE Logo" class="brand-logo" />
          <div class="brand-copy">
            <p class="brand-name">UDAKE</p>
            <p class="brand-sub">智能不确定性驱动空间决策平台</p>
          </div>

      <main class="detail-main">
        <section class="detail-hero">
          <p class="detail-kicker">模块标题</p>
          <h1>模块详情标题</h1>
          <p class="detail-subtitle">模块一句话价值说明（2-3 句内）</p>

        <section class="detail-layout" aria-label="Feature details">
          <article class="detail-panel detail-panel-wide">
            <h2>模块概述</h2>

              <li>核心功能 3 + 简要说明</li>

          <article class="detail-panel">
            <h2>适用场景</h2>

              <li>场景 1</li>
              <li>场景 2</li>
              <li>场景 3</li>
            </ul>
          </article>
        </section>

        <section class="detail-cta" aria-label="Actions">
          <a class="cta-btn cta-link" href="https://github.com/Kevin-Wu200/UDAKE" target="_blank" rel="noreferrer">查看文档</a>
          <a class="cta-btn cta-link cta-link-alt" href="./index.html#downloads">开始使用</a>
        </section>

        <div class="detail-actions">
          <a class="cta-btn" href="./index.html#features">返回首页</a>
        </div>
