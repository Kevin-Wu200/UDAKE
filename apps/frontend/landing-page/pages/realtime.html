<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-i18n="pages.realtime.metaTitle">UDAKE</title>
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/styles.css" />
    <link rel="stylesheet" href="../css/pages.css" />
  </head>
  <body class="page-detail" data-feature="realtime">
    <div class="page-shell">
      <header class="site-header detail-header reveal">
        <a
          class="brand"
          href="../index.html#hero"
          data-i18n-aria-label="brand.ariaHome"
          aria-label="UDAKE Home"
        >
          <img src="../assets/logo.png" alt="UDAKE Logo" class="brand-logo" />
          <div class="brand-copy">
            <p class="brand-name">UDAKE</p>
            <p class="brand-sub" data-i18n="brand.title">
              智能不确定性驱动空间决策平台
            </p>
          </div>
        </a>
        <button
          id="languageToggle"
          class="lang-btn"
          type="button"
          data-i18n-aria-label="language.toggleAria"
        >
          English
        </button>
      </header>

      <main class="detail-main">
        <section class="detail-hero reveal">
          <p class="detail-kicker" data-i18n="features.items.realtime.title">
            模块标题
          </p>
          <h1 data-i18n="pages.realtime.heroTitle">模块详情</h1>
          <p class="detail-subtitle" data-i18n="pages.realtime.heroSubtitle">
            模块描述
          </p>
        </section>

        <section class="detail-layout reveal" aria-label="Feature details">
          <article class="detail-panel">
            <h2 data-i18n="pages.common.introTitle">功能介绍</h2>
            <p data-i18n="pages.realtime.intro">介绍内容</p>
          </article>

          <article class="detail-panel">
            <h2 data-i18n="pages.common.techTitle">技术特点</h2>
            <ul class="detail-list">
              <li data-i18n="pages.realtime.tech.0">技术点 1</li>
              <li data-i18n="pages.realtime.tech.1">技术点 2</li>
              <li data-i18n="pages.realtime.tech.2">技术点 3</li>
            </ul>
          </article>

          <article class="detail-panel">
            <h2 data-i18n="pages.common.valueTitle">业务价值</h2>
            <ul class="detail-list">
              <li data-i18n="pages.realtime.value.0">价值点 1</li>
              <li data-i18n="pages.realtime.value.1">价值点 2</li>
              <li data-i18n="pages.realtime.value.2">价值点 3</li>
            </ul>
          </article>
        </section>

        <div class="detail-actions reveal">
          <button
            id="backHomeButton"
            class="cta-btn"
            type="button"
            data-i18n="pages.common.backHome"
          >
            返回首页
          </button>
        </div>
      </main>

      <footer class="site-footer reveal">
        <p data-i18n="footer.copy">© 2026 UDAKE. All rights reserved.</p>
      </footer>
    </div>

    <script src="../js/i18n.js"></script>
    <script src="../js/main.js"></script>
  </body>
</html>
