# Ruff 全局配置
target-version = "py311"

[lint]
select = ["E", "F"]
ignore = ["E501"]

# 允许在以下场景中模块级导入不在顶部（sys.path 操作后导入）
[lint.per-file-ignores]
"**/examples/**" = ["E402"]
"**/api/**" = ["E402"]
"**/tests/**" = ["E402"]
"**/__init__.py" = ["F401"]
"services/backend/run.py" = ["E402"]
"services/backend/app/main.py" = ["E402"]
"services/backend/app/dl_services/**" = ["E402"]
"services/backend/app/route_planning/**" = ["E402"]
"services/backend/app/auth_db/**" = ["E402"]
